services:
  hltv-relay:
    image: ghcr.io/deadlock-api/hltv-relay:latest
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
